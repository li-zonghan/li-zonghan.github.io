    bio: "I am a grad student in the Faculty of Education at Beijing Normal University. My previous research primarily focused on teacher online communities, where I employed network analysis to study community structures, social capital, and knowledge-sharing behaviors. I am currently a visiting student at the University of Toronto for the Fall 2025/Winter 2026 semesters. I am keenly interested in exploring how novel AI methods can be applied to investigate online community behaviors, particularly the knowledge-sharing dynamics among teachers. I am also interested in AI algorithms and tools designed to promote and enhance knowledge sharing between teachers."
